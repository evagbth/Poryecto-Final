<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresa a la mente</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: #000;
  }

  /* ─── SCENE 1: ENTRADA ─── */
  #scene-entry {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center,
      #f5ede0 0%, #d4b8e0 30%, #7b4fa6 60%, #1a0a2e 100%);
    cursor: pointer;
    transition: opacity 0.8s ease;
    z-index: 10;
  }
  #scene-entry.fade-out { opacity: 0; pointer-events: none; }

  .entry-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    color: #fff;
    text-decoration: underline;
    text-decoration-color: rgba(255,255,255,0.9);
    text-underline-offset: 8px;
    text-decoration-thickness: 2px;
    letter-spacing: 0.04em;
    user-select: none;
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
    transition: text-shadow 0.3s;
  }
  .entry-title:hover {
    text-shadow: 0 0 60px rgba(255,255,255,0.7), 0 0 120px rgba(180,120,255,0.4);
  }

  /* ─── SCENE 2: CUBOS ─── */
  #scene-cubes {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center; gap: 12vw;
    background: radial-gradient(ellipse at center, #2a1050 0%, #0d0618 100%);
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
    perspective: 1000px;
  }
  #scene-cubes.active { opacity: 1; pointer-events: all; }

  .cube-wrapper {
    position: relative;
    cursor: pointer;
  }
  .cube-label {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    font-family: 'Inter', sans-serif;
  }

  .cube-scene {
    width: 160px; height: 160px;
    perspective: 600px;
  }
  .cube {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: float 4s ease-in-out infinite, spin 12s linear infinite;
    transition: transform 0.1s;
  }
  .cube-wrapper:hover .cube { animation-play-state: paused; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotateX(20deg) rotateY(0deg); }
    50% { transform: translateY(-20px) rotateX(20deg) rotateY(180deg); }
  }
  @keyframes spin {
    from { transform: translateY(0) rotateX(15deg) rotateY(0deg); }
    to { transform: translateY(0) rotateX(15deg) rotateY(360deg); }
  }

  .face {
    position: absolute; width: 160px; height: 160px;
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    backface-visibility: visible;
  }

  /* Cubo Claro */
  #cube-light .face-front  { background: rgba(255,240,200,0.85); transform: translateZ(80px); }
  #cube-light .face-back   { background: rgba(220,200,255,0.85); transform: rotateY(180deg) translateZ(80px); }
  #cube-light .face-left   { background: rgba(200,235,255,0.85); transform: rotateY(-90deg) translateZ(80px); }
  #cube-light .face-right  { background: rgba(255,220,200,0.85); transform: rotateY(90deg) translateZ(80px); }
  #cube-light .face-top    { background: rgba(220,255,220,0.85); transform: rotateX(90deg) translateZ(80px); }
  #cube-light .face-bottom { background: rgba(255,210,220,0.85); transform: rotateX(-90deg) translateZ(80px); }
  #cube-light .face-inner  {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; color: #7b4fa6;
    font-style: italic;
  }

  /* Cubo Oscuro */
  #cube-dark .face-front  { background: rgba(20,5,40,0.92);   transform: translateZ(80px); }
  #cube-dark .face-back   { background: rgba(40,10,30,0.92);  transform: rotateY(180deg) translateZ(80px); }
  #cube-dark .face-left   { background: rgba(10,15,50,0.92);  transform: rotateY(-90deg) translateZ(80px); }
  #cube-dark .face-right  { background: rgba(30,5,45,0.92);   transform: rotateY(90deg) translateZ(80px); }
  #cube-dark .face-top    { background: rgba(15,20,40,0.92);  transform: rotateX(90deg) translateZ(80px); }
  #cube-dark .face-bottom { background: rgba(25,5,35,0.92);   transform: rotateX(-90deg) translateZ(80px); }

  /* Bordes oscuros más visibles */
  #cube-dark .face { border-color: rgba(150,80,255,0.25); }

  /* ─── SCENE 3: INTERIOR CUBO (luz / sombra) ─── */
  #scene-interior {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
    z-index: 20;
  }
  #scene-interior.active { opacity: 1; pointer-events: all; }

  #scene-interior.light-mode { background: #fff; }
  #scene-interior.dark-mode  { background: #000; }

  .interior-word {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 12vw, 9rem);
    cursor: pointer;
    user-select: none;
    font-style: italic;
    transition: transform 0.3s, text-shadow 0.3s;
  }
  .interior-word:hover { transform: scale(1.05); }

  .light-mode .interior-word {
    color: #b89ad4;
    text-shadow: 0 0 80px rgba(180,140,255,0.4);
  }
  .light-mode .interior-word:hover {
    text-shadow: 0 0 120px rgba(180,140,255,0.8);
  }

  .dark-mode .interior-word {
    color: #2a0a4a;
    text-shadow: 0 0 80px rgba(60,10,100,0.6);
  }
  .dark-mode .interior-word:hover {
    text-shadow: 0 0 120px rgba(80,20,130,0.9);
  }

  /* ─── SCENE 4: LLUVIA DE PALABRAS ─── */
  #scene-words {
    position: fixed; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
    overflow: hidden;
    z-index: 30;
  }
  #scene-words.active { opacity: 1; pointer-events: all; }
  #scene-words.positive { background: #fff; }
  #scene-words.negative { background: #000; }

  .word-particle {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 1s ease;
    will-change: transform, opacity;
  }

  /* Botón volver */
  .back-btn {
    position: fixed; top: 1.5rem; left: 1.5rem;
    background: none; border: 1px solid rgba(128,128,128,0.4);
    color: rgba(128,128,128,0.7);
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 100;
    border-radius: 2px;
  }
  .back-btn:hover {
    border-color: rgba(180,140,255,0.6);
    color: rgba(180,140,255,0.9);
  }

  /* Hint de zoom */
  .zoom-hint {
    position: fixed;
    bottom: 1.8rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.25);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<!-- SCENE 1: ENTRADA -->
<div id="scene-entry">
  <span class="entry-title">Ingresa a la mente</span>
</div>

<!-- SCENE 2: CUBOS -->
<div id="scene-cubes">
  <button class="back-btn" id="back-from-cubes">← Salir</button>
  <div class="zoom-hint" id="zoom-hint">scroll para zoom · arrastra para rotar · clic para entrar</div>

  <!-- Cubo Claro -->
  <div class="cube-wrapper" id="wrapper-light">
    <div class="cube-label">Luz</div>
    <div class="cube-scene">
      <div class="cube" id="cube-light">
        <div class="face face-front"></div>
        <div class="face face-back"></div>
        <div class="face face-left"></div>
        <div class="face face-right"></div>
        <div class="face face-top"></div>
        <div class="face face-bottom"></div>
      </div>
    </div>
  </div>

  <!-- Cubo Oscuro -->
  <div class="cube-wrapper" id="wrapper-dark">
    <div class="cube-label">Sombra</div>
    <div class="cube-scene">
      <div class="cube" id="cube-dark">
        <div class="face face-front"></div>
        <div class="face face-back"></div>
        <div class="face face-left"></div>
        <div class="face face-right"></div>
        <div class="face face-top"></div>
        <div class="face face-bottom"></div>
      </div>
    </div>
  </div>
</div>

<!-- SCENE 3: INTERIOR -->
<div id="scene-interior">
  <button class="back-btn" id="back-from-interior">← Volver</button>
  <span class="interior-word" id="interior-word"></span>
</div>

<!-- SCENE 4: PALABRAS -->
<div id="scene-words">
  <button class="back-btn" id="back-from-words">← Volver</button>
</div>

<script>
// ─── DATOS ───
const positiveWords = [
  'amor','esperanza','calma','gratitud','alegría','luz','paz','fuerza',
  'gracia','ternura','vida','florecer','libertad','confianza','plenitud',
  'serenidad','claridad','brillo','dulzura','abrazo','renacer','infinito',
  'crecer','soñar','vuelo','aurora','latido','caricia','sonrisa','armonía'
];

const negativeWords = [
  'miedo','vacío','oscuridad','soledad','duda','silencio','peso','herida',
  'olvido','sombra','niebla','tormenta','desolación','abismo','frío',
  'tristeza','ruptura','ausencia','pérdida','cansancio','noche','laberinto',
  'grieta','muralla','tinieblas','ceniza','eco','naufragio','caída','tormento'
];

// Colores
const lightColors = ['#c9a8e0','#a8c4e0','#e0a8c4','#a8e0c4','#e0d4a8','#c4a8e0','#a8e0d4','#d4c4e0'];
const darkColors  = ['#ffffff','#e8e8ff','#ffe8e8','#e8ffe8','#ffe8ff','#f0f0ff'];

// ─── ESTADOS ───
let currentCubeMode = null; // 'light' | 'dark'
let wordInterval = null;

// ─── UTILIDADES ───
const $ = id => document.getElementById(id);
function show(el) { el.classList.add('active'); }
function hide(el) { el.classList.remove('active'); }
function fadeOut(el, cb) {
  el.classList.add('fade-out');
  setTimeout(() => { el.style.display = 'none'; if (cb) cb(); }, 850);
}

// ─── ESCENA 1 → 2 ───
$('scene-entry').addEventListener('click', () => {
  fadeOut($('scene-entry'), () => {
    show($('scene-cubes'));
  });
});

// ─── DRAG + ZOOM para rotar cubos ───
function makeDraggable(cubeEl) {
  let dragging = false, lastX = 0, lastY = 0;
  let rotX = 15, rotY = 0;
  let scale = 1;
  const SCALE_MIN = 0.3, SCALE_MAX = 3.5;

  function applyTransform() {
    cubeEl.style.transform =
      `scale(${scale}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  }

  // ── Auto-rotación con requestAnimationFrame ──
  let animId = null;
  let autoRotating = true;

  function autoSpin() {
    rotY += 0.4;
    applyTransform();
    animId = requestAnimationFrame(autoSpin);
  }

  function startAuto() {
    if (autoRotating && !animId) animId = requestAnimationFrame(autoSpin);
  }
  function stopAuto() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
  }

  // Quitar la animación CSS (la manejamos nosotros con rAF)
  cubeEl.style.animation = 'none';
  startAuto();

  function applyTransform() {
    cubeEl.style.transform =
      `scale(${scale}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  }

  const wrapper = cubeEl.parentElement; // .cube-scene

  // ── Mouse drag ──
  wrapper.addEventListener('mousedown', e => {
    stopAuto();
    autoRotating = false;
    dragging = false;
    lastX = e.clientX; lastY = e.clientY;

    const onMove = e2 => {
      const dx = e2.clientX - lastX;
      const dy = e2.clientY - lastY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragging = true;
      rotY += dx * 0.7;
      rotX -= dy * 0.7;
      applyTransform();
      lastX = e2.clientX; lastY = e2.clientY;
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      dragging = false;
      // Reanudar auto-spin tras 2 s de inactividad
      setTimeout(() => { autoRotating = true; startAuto(); }, 2000);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // ── Rueda del mouse: zoom ──
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.12 : 0.12;
    scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale + delta));
    applyTransform();
  }, { passive: false });

  // ── Touch: drag (1 dedo) + pinch zoom (2 dedos) ──
  let lastPinchDist = null;

  wrapper.addEventListener('touchstart', e => {
    stopAuto(); autoRotating = false;
    if (e.touches.length === 1) {
      const t = e.touches[0];
      lastX = t.clientX; lastY = t.clientY;
      lastPinchDist = null;
    } else if (e.touches.length === 2) {
      lastPinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: true });

  window.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && lastPinchDist === null) {
      const t = e.touches[0];
      const dx = t.clientX - lastX;
      const dy = t.clientY - lastY;
      rotY += dx * 0.7; rotX -= dy * 0.7;
      applyTransform();
      lastX = t.clientX; lastY = t.clientY;
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (lastPinchDist !== null) {
        const ratio = dist / lastPinchDist;
        scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale * ratio));
        applyTransform();
      }
      lastPinchDist = dist;
    }
  }, { passive: true });

  window.addEventListener('touchend', e => {
    if (e.touches.length < 2) {
      lastPinchDist = null;
      setTimeout(() => { autoRotating = true; startAuto(); }, 2000);
    }
  });
}

makeDraggable($('cube-light'));
makeDraggable($('cube-dark'));

// Ocultar hint tras 4 segundos en la escena de cubos
$('scene-cubes').addEventListener('transitionend', () => {
  setTimeout(() => {
    const hint = $('zoom-hint');
    if (hint) hint.style.opacity = '0';
  }, 4000);
});

// ─── ESCENA 2 → 3 (entrar al cubo) ───
$('wrapper-light').addEventListener('click', () => enterCube('light'));
$('wrapper-dark').addEventListener('click',  () => enterCube('dark'));

function enterCube(mode) {
  currentCubeMode = mode;
  const interior = $('scene-interior');
  const word = $('interior-word');

  interior.className = 'active ' + (mode === 'light' ? 'light-mode' : 'dark-mode');
  word.textContent = mode === 'light' ? 'luz' : 'sombra';

  hide($('scene-cubes'));
  show(interior);
}

// ─── ESCENA 3 → 4 (clic en palabra) ───
$('interior-word').addEventListener('click', () => {
  const mode = currentCubeMode;
  hide($('scene-interior'));
  startWordRain(mode);
});

// ─── LLUVIA DE PALABRAS ───
function startWordRain(mode) {
  const scene = $('scene-words');
  scene.className = 'active ' + (mode === 'light' ? 'positive' : 'negative');

  // Limpiar palabras previas
  scene.querySelectorAll('.word-particle').forEach(w => w.remove());
  if (wordInterval) clearInterval(wordInterval);

  const words  = mode === 'light' ? positiveWords : negativeWords;
  const colors = mode === 'light' ? lightColors : darkColors;

  function spawnWord() {
    const el = document.createElement('span');
    el.className = 'word-particle';
    el.textContent = words[Math.floor(Math.random() * words.length)];

    const size = Math.random() * 3.5 + 0.8; // 0.8 – 4.3rem
    el.style.fontSize = size + 'rem';
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.style.fontWeight = Math.random() > 0.5 ? '700' : '400';
    el.style.opacity = '0';

    // Posición aleatoria
    const x = Math.random() * 90;
    const y = Math.random() * 85;
    el.style.left = x + 'vw';
    el.style.top  = y + 'vh';

    // Rotación sutil
    el.style.transform = `rotate(${(Math.random() - 0.5) * 12}deg)`;

    scene.appendChild(el);

    // Aparecer
    requestAnimationFrame(() => {
      el.style.opacity = (Math.random() * 0.5 + 0.3).toString();
    });

    // Desaparecer después de un tiempo aleatorio
    const life = Math.random() * 3000 + 2000;
    setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 1000);
    }, life);
  }

  // Sembrar inicialmente
  for (let i = 0; i < 20; i++) {
    setTimeout(spawnWord, i * 100);
  }

  wordInterval = setInterval(spawnWord, 400);
  show(scene);
}

// ─── BOTONES VOLVER ───
$('back-from-cubes').addEventListener('click', () => {
  hide($('scene-cubes'));
  const entry = $('scene-entry');
  entry.style.display = '';
  entry.classList.remove('fade-out');
  entry.style.opacity = '0';
  setTimeout(() => { entry.style.opacity = ''; }, 50);
});

$('back-from-interior').addEventListener('click', () => {
  hide($('scene-interior'));
  show($('scene-cubes'));
});

$('back-from-words').addEventListener('click', () => {
  const scene = $('scene-words');
  hide(scene);
  if (wordInterval) { clearInterval(wordInterval); wordInterval = null; }
  scene.querySelectorAll('.word-particle').forEach(w => w.remove());
  show($('scene-interior'));
});
</script>
</body>
</html>
