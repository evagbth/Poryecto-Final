<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresa a la mente</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }

  /* ── ESCENA 1: ENTRADA ── */
  #scene-entry {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #f5ede0 0%, #d4b8e0 30%, #7b4fa6 60%, #1a0a2e 100%);
    cursor: pointer; transition: opacity 0.8s ease; z-index: 10;
  }
  #scene-entry.fade-out { opacity: 0; pointer-events: none; }
  .entry-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4.5rem); color: #fff;
    text-decoration: underline; text-decoration-color: rgba(255,255,255,0.9);
    text-underline-offset: 8px; text-decoration-thickness: 2px;
    letter-spacing: 0.04em; user-select: none;
    text-shadow: 0 0 40px rgba(255,255,255,0.3); transition: text-shadow 0.3s;
  }
  .entry-title:hover { text-shadow: 0 0 60px rgba(255,255,255,0.7), 0 0 120px rgba(180,120,255,0.4); }

  /* ── ESCENA 2: CUBOS ── */
  #scene-cubes {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center; gap: 12vw;
    background: radial-gradient(ellipse at center, #2a1050 0%, #0d0618 100%);
    opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
  }
  #scene-cubes.active { opacity: 1; pointer-events: all; }

  .cube-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; }
  .cube-label {
    color: rgba(255,255,255,0.4); font-size: 0.68rem; letter-spacing: 0.22em;
    text-transform: uppercase; margin-bottom: 1.2rem; transition: opacity 0.4s;
  }
  .cube-scene { width: 160px; height: 160px; perspective: 600px; cursor: grab; }
  .cube-scene:active { cursor: grabbing; }
  .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

  .face {
    position: absolute; width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    backface-visibility: visible;
  }
  /* ── caras cubo claro ── */
  #cube-light .face-front  { background: rgba(255,240,200,0.88); transform: translateZ(80px);              border: 1px solid rgba(255,255,255,0.25); }
  #cube-light .face-back   { background: rgba(220,200,255,0.88); transform: rotateY(180deg) translateZ(80px); border: 1px solid rgba(255,255,255,0.25); }
  #cube-light .face-left   { background: rgba(200,235,255,0.88); transform: rotateY(-90deg) translateZ(80px); border: 1px solid rgba(255,255,255,0.25); }
  #cube-light .face-right  { background: rgba(255,220,200,0.88); transform: rotateY(90deg)  translateZ(80px); border: 1px solid rgba(255,255,255,0.25); }
  #cube-light .face-top    { background: rgba(220,255,220,0.88); transform: rotateX(90deg)  translateZ(80px); border: 1px solid rgba(255,255,255,0.25); }
  #cube-light .face-bottom { background: rgba(255,210,220,0.88); transform: rotateX(-90deg) translateZ(80px); border: 1px solid rgba(255,255,255,0.25); }
  /* ── caras cubo oscuro ── */
  #cube-dark .face-front  { background: rgba(20,5,40,0.96);  transform: translateZ(80px);              border: 1px solid rgba(140,70,255,0.3); }
  #cube-dark .face-back   { background: rgba(40,10,30,0.96); transform: rotateY(180deg) translateZ(80px); border: 1px solid rgba(140,70,255,0.3); }
  #cube-dark .face-left   { background: rgba(10,15,50,0.96); transform: rotateY(-90deg) translateZ(80px); border: 1px solid rgba(140,70,255,0.3); }
  #cube-dark .face-right  { background: rgba(30,5,45,0.96);  transform: rotateY(90deg)  translateZ(80px); border: 1px solid rgba(140,70,255,0.3); }
  #cube-dark .face-top    { background: rgba(15,20,40,0.96); transform: rotateX(90deg)  translateZ(80px); border: 1px solid rgba(140,70,255,0.3); }
  #cube-dark .face-bottom { background: rgba(25,5,35,0.96);  transform: rotateX(-90deg) translateZ(80px); border: 1px solid rgba(140,70,255,0.3); }

  /* Barra de progreso de zoom */
  #zoom-bar-wrap {
    position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 50;
  }
  #zoom-bar-wrap.visible { opacity: 1; }
  #zoom-bar-track {
    width: 140px; height: 3px; border-radius: 2px;
    background: rgba(255,255,255,0.12);
  }
  #zoom-bar-fill {
    height: 100%; border-radius: 2px; width: 0%;
    background: linear-gradient(to right, #a07de0, #e0a0d0);
    transition: width 0.15s ease;
  }
  #zoom-bar-label {
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.3); font-family: 'Inter', sans-serif;
  }

  /* Hints */
  .hint {
    position: fixed; bottom: 1.8rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.22); font-size: 0.62rem; letter-spacing: 0.18em;
    text-transform: uppercase; font-family: 'Inter', sans-serif;
    pointer-events: none; z-index: 50; transition: opacity 0.6s; white-space: nowrap;
  }

  /* ── ESCENA 3: INTERIOR ── */
  #scene-interior {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.9s ease; z-index: 20;
  }
  #scene-interior.active { opacity: 1; pointer-events: all; }
  #scene-interior.light-mode { background: radial-gradient(ellipse at center, #fffaf2 0%, #e8d5f5 50%, #cdb8e8 100%); }
  #scene-interior.dark-mode  { background: radial-gradient(ellipse at center, #190830 0%, #0d0520 55%, #04010e 100%); }

  /* Paredes-esquinas del cubo vistas desde dentro */
  .corner-vignette {
    position: absolute; inset: 0; pointer-events: none;
  }
  .light-mode .corner-vignette {
    background:
      radial-gradient(ellipse at 0% 0%,   rgba(185,145,230,0.35) 0%, transparent 40%),
      radial-gradient(ellipse at 100% 0%,  rgba(160,200,240,0.30) 0%, transparent 40%),
      radial-gradient(ellipse at 0% 100%,  rgba(230,180,200,0.30) 0%, transparent 40%),
      radial-gradient(ellipse at 100% 100%,rgba(190,230,195,0.25) 0%, transparent 40%);
  }
  .dark-mode .corner-vignette {
    background:
      radial-gradient(ellipse at 0% 0%,   rgba(70,20,140,0.5) 0%, transparent 45%),
      radial-gradient(ellipse at 100% 0%,  rgba(40,10,100,0.4) 0%, transparent 45%),
      radial-gradient(ellipse at 0% 100%,  rgba(90,10,60,0.4)  0%, transparent 45%),
      radial-gradient(ellipse at 100% 100%,rgba(20,10,120,0.4) 0%, transparent 45%);
  }

  /* Partículas */
  .inner-particle {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: particleDrift linear infinite; opacity: 0;
  }
  @keyframes particleDrift {
    0%   { transform: translateY(0)   scale(1);   opacity: 0; }
    12%  { opacity: 0.8; }
    88%  { opacity: 0.5; }
    100% { transform: translateY(-65vh) scale(0.2); opacity: 0; }
  }

  /* Palabra interior */
  .inner-word {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 13vw, 10rem); font-style: italic;
    cursor: pointer; user-select: none; position: relative; z-index: 2;
    transition: transform 0.35s, letter-spacing 0.4s, text-shadow 0.35s;
    letter-spacing: 0.02em;
  }
  .inner-word:hover { transform: scale(1.07); letter-spacing: 0.1em; }
  .light-mode .inner-word {
    color: #8a5cbf;
    text-shadow: 0 0 60px rgba(138,92,191,0.45), 0 0 130px rgba(138,92,191,0.15);
  }
  .light-mode .inner-word:hover { text-shadow: 0 0 90px rgba(138,92,191,0.9), 0 0 200px rgba(138,92,191,0.3); }
  .dark-mode .inner-word {
    color: #d4a8f4;
    text-shadow: 0 0 60px rgba(180,120,240,0.55), 0 0 130px rgba(180,120,240,0.2);
  }
  .dark-mode .inner-word:hover { text-shadow: 0 0 100px rgba(210,160,255,0.95), 0 0 220px rgba(210,160,255,0.3); }

  /* hint interior */
  .inner-hint {
    position: absolute; bottom: 2.2rem; left: 50%; transform: translateX(-50%);
    font-family: 'Inter', sans-serif; font-size: 0.62rem; letter-spacing: 0.2em;
    text-transform: uppercase; pointer-events: none;
    animation: hintPulse 3s ease-in-out 1.2s infinite;
  }
  .light-mode .inner-hint { color: rgba(100,60,180,0.45); }
  .dark-mode  .inner-hint { color: rgba(200,150,255,0.4); }
  @keyframes hintPulse { 0%,100% { opacity:0; } 50% { opacity:1; } }

  /* ── ESCENA 4: LLUVIA DE PALABRAS ── */
  #scene-words {
    position: fixed; inset: 0; overflow: hidden;
    opacity: 0; pointer-events: none; transition: opacity 0.8s ease; z-index: 30;
  }
  #scene-words.active { opacity: 1; pointer-events: all; }
  #scene-words.positive { background: #fff; }
  #scene-words.negative { background: #000; }
  .word-particle {
    position: absolute; font-family: 'Playfair Display', serif; font-style: italic;
    pointer-events: none; white-space: nowrap; transition: opacity 1s ease;
  }

  /* ── BOTÓN VOLVER ── */
  .back-btn {
    position: fixed; top: 1.5rem; left: 1.5rem;
    background: none; border: 1px solid rgba(128,128,128,0.35);
    color: rgba(180,180,180,0.6); font-family: 'Inter', sans-serif;
    font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
    padding: 0.5rem 1rem; cursor: pointer; transition: all 0.3s;
    z-index: 100; border-radius: 2px;
  }
  .back-btn:hover { border-color: rgba(180,140,255,0.6); color: rgba(180,140,255,0.9); }
</style>
</head>
<body>

<!-- ESCENA 1 -->
<div id="scene-entry">
  <span class="entry-title">Ingresa a la mente</span>
</div>

<!-- ESCENA 2: CUBOS -->
<div id="scene-cubes">
  <button class="back-btn" id="back-from-cubes">← Salir</button>

  <div class="cube-wrapper" id="wrapper-light">
    <div class="cube-label">Luz</div>
    <div class="cube-scene" id="scene-light">
      <div class="cube" id="cube-light">
        <div class="face face-front"></div>
        <div class="face face-back"></div>
        <div class="face face-left"></div>
        <div class="face face-right"></div>
        <div class="face face-top"></div>
        <div class="face face-bottom"></div>
      </div>
    </div>
  </div>

  <div class="cube-wrapper" id="wrapper-dark">
    <div class="cube-label">Sombra</div>
    <div class="cube-scene" id="scene-dark">
      <div class="cube" id="cube-dark">
        <div class="face face-front"></div>
        <div class="face face-back"></div>
        <div class="face face-left"></div>
        <div class="face face-right"></div>
        <div class="face face-top"></div>
        <div class="face face-bottom"></div>
      </div>
    </div>
  </div>

  <!-- Barra de zoom -->
  <div id="zoom-bar-wrap">
    <div id="zoom-bar-label">acercándote…</div>
    <div id="zoom-bar-track"><div id="zoom-bar-fill"></div></div>
  </div>
  <div class="hint" id="zoom-hint">scroll para acercarte · arrastra para girar</div>
</div>

<!-- ESCENA 3: INTERIOR -->
<div id="scene-interior">
  <button class="back-btn" id="back-from-interior">← Volver</button>
  <div class="corner-vignette"></div>
  <span class="inner-word" id="inner-word"></span>
  <span class="inner-hint">toca la palabra</span>
</div>

<!-- ESCENA 4: PALABRAS -->
<div id="scene-words">
  <button class="back-btn" id="back-from-words">← Volver</button>
</div>

<script>
/* ─── DATOS ─── */
const positiveWords = ['amor','esperanza','calma','gratitud','alegría','luz','paz','fuerza','gracia','ternura','vida','florecer','libertad','confianza','plenitud','serenidad','claridad','brillo','dulzura','abrazo','renacer','infinito','crecer','soñar','vuelo','aurora','latido','caricia','sonrisa','armonía'];
const negativeWords = ['miedo','vacío','oscuridad','soledad','duda','silencio','peso','herida','olvido','sombra','niebla','tormenta','desolación','abismo','frío','tristeza','ruptura','ausencia','pérdida','cansancio','noche','laberinto','grieta','muralla','tinieblas','ceniza','eco','naufragio','caída','tormento'];
const lightColors   = ['#c9a8e0','#a8c4e0','#e0a8c4','#a8e0c4','#e0d4a8','#c4a8e0','#a8e0d4','#d4c4e0'];
const darkColors    = ['#ffffff','#e8e8ff','#ffe8e8','#e8ffe8','#ffe8ff','#f0f0ff'];

/* ─── UTILS ─── */
const $     = id => document.getElementById(id);
const show  = el => el.classList.add('active');
const hide  = el => el.classList.remove('active');

let currentMode  = null;
let wordInterval = null;

/* ─── ESCENA 1 → 2 ─── */
$('scene-entry').addEventListener('click', () => {
  $('scene-entry').classList.add('fade-out');
  setTimeout(() => { $('scene-entry').style.display = 'none'; show($('scene-cubes')); }, 820);
});

/* ─── INIT CUBO ─── */
const SCALE_MIN = 0.4;
const SCALE_MAX = 3.6;   // al llegar aquí → entra
const ENTER_THRESHOLD = 3.4;

function initCube(cubeEl, mode) {
  let rotX = 18, rotY = 0, scale = 1;
  let animId = null, autoOn = true;
  let hasEntered = false;

  const wrapper   = cubeEl.closest('.cube-wrapper');
  const cubeScene = cubeEl.parentElement;

  function applyTransform() {
    cubeEl.style.transform = `scale(${scale}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    updateZoomBar(scale, mode);
    // Umbral de entrada
    if (scale >= ENTER_THRESHOLD && !hasEntered) {
      hasEntered = true;
      stopAuto();
      setTimeout(() => triggerEnter(mode), 150);
    }
  }

  /* Auto-spin */
  function autoSpin() { rotY += 0.38; applyTransform(); animId = requestAnimationFrame(autoSpin); }
  function startAuto() { if (autoOn && !animId) animId = requestAnimationFrame(autoSpin); }
  function stopAuto()  { if (animId) { cancelAnimationFrame(animId); animId = null; } }
  startAuto();

  cubeEl._reset = () => {
    hasEntered = false; scale = 1; rotX = 18; rotY = 0; autoOn = true;
    applyTransform(); startAuto();
  };

  /* ── Drag ── */
  let dragging = false, lastX = 0, lastY = 0;

  cubeScene.addEventListener('mousedown', e => {
    stopAuto(); autoOn = false; dragging = false;
    lastX = e.clientX; lastY = e.clientY;
    const onMove = e2 => {
      const dx = e2.clientX - lastX, dy = e2.clientY - lastY;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragging = true;
      rotY += dx * 0.65; rotX -= dy * 0.65;
      applyTransform();
      lastX = e2.clientX; lastY = e2.clientY;
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      dragging = false;
      setTimeout(() => { autoOn = true; startAuto(); }, 1800);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  /* ── Wheel zoom ── */
  cubeScene.addEventListener('wheel', e => {
    e.preventDefault();
    stopAuto(); autoOn = false;
    scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale + (e.deltaY > 0 ? -0.18 : 0.18)));
    applyTransform();
    clearTimeout(cubeEl._wheelTimeout);
    cubeEl._wheelTimeout = setTimeout(() => { autoOn = true; startAuto(); }, 2000);
  }, { passive: false });

  /* ── Touch pinch ── */
  let lastPinch = null, tLastX = 0, tLastY = 0;
  cubeScene.addEventListener('touchstart', e => {
    stopAuto(); autoOn = false;
    if (e.touches.length === 1) {
      tLastX = e.touches[0].clientX; tLastY = e.touches[0].clientY; lastPinch = null;
    } else if (e.touches.length === 2) {
      lastPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
  }, { passive: true });
  window.addEventListener('touchmove', e => {
    if (!$('scene-cubes').classList.contains('active')) return;
    if (e.touches.length === 1 && lastPinch === null) {
      const dx = e.touches[0].clientX - tLastX, dy = e.touches[0].clientY - tLastY;
      rotY += dx * 0.65; rotX -= dy * 0.65; applyTransform();
      tLastX = e.touches[0].clientX; tLastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (lastPinch) { scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale * (d / lastPinch))); applyTransform(); }
      lastPinch = d;
    }
  }, { passive: true });
  window.addEventListener('touchend', e => {
    if (e.touches.length < 2) { lastPinch = null; setTimeout(() => { autoOn = true; startAuto(); }, 1800); }
  });
}

/* ─── BARRA DE ZOOM ─── */
let activeZoomMode = null;
function updateZoomBar(scale, mode) {
  const pct = Math.max(0, Math.min(100, ((scale - SCALE_MIN) / (ENTER_THRESHOLD - SCALE_MIN)) * 100));
  if (pct > 5) {
    $('zoom-bar-wrap').classList.add('visible');
    $('zoom-hint').style.opacity = '0';
    activeZoomMode = mode;
  } else if (activeZoomMode === mode) {
    // no ocultar si otro cubo está activo
  }
  $('zoom-bar-fill').style.width = pct + '%';
  const label = pct < 95
    ? 'acercándote…'
    : '¡ya casi entras!';
  $('zoom-bar-label').textContent = label;
}

/* ─── ENTRAR AL CUBO ─── */
function triggerEnter(mode) {
  currentMode = mode;
  const interior = $('scene-interior');
  interior.className = 'active ' + (mode === 'light' ? 'light-mode' : 'dark-mode');
  $('inner-word').textContent = mode === 'light' ? 'luz' : 'sombra';

  // Limpiar partículas viejas
  interior.querySelectorAll('.inner-particle').forEach(p => p.remove());
  spawnParticles(interior, mode);

  hide($('scene-cubes'));
  $('zoom-bar-wrap').classList.remove('visible');
}

function spawnParticles(container, mode) {
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'inner-particle';
    const size = Math.random() * 16 + 4;
    const hue  = mode === 'light' ? 260 + Math.random() * 60 : 250 + Math.random() * 40;
    const lum  = mode === 'light' ? 65 + Math.random() * 20  : 18  + Math.random() * 18;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*110}vh;animation-duration:${Math.random()*9+5}s;animation-delay:${Math.random()*5}s;background:hsl(${hue},55%,${lum}%);`;
    container.appendChild(p);
  }
}

/* ─── CLIC EN PALABRA → lluvia ─── */
$('inner-word').addEventListener('click', () => {
  hide($('scene-interior'));
  setTimeout(() => startWordRain(currentMode), 350);
});

/* ─── LLUVIA DE PALABRAS ─── */
function startWordRain(mode) {
  const scene = $('scene-words');
  scene.className = 'active ' + (mode === 'light' ? 'positive' : 'negative');
  scene.querySelectorAll('.word-particle').forEach(w => w.remove());
  if (wordInterval) clearInterval(wordInterval);

  const words  = mode === 'light' ? positiveWords : negativeWords;
  const colors = mode === 'light' ? lightColors    : darkColors;

  function spawnWord() {
    const el = document.createElement('span');
    el.className = 'word-particle';
    el.textContent = words[Math.floor(Math.random() * words.length)];
    const size = Math.random() * 3.8 + 0.7;
    el.style.cssText = `font-size:${size}rem;color:${colors[Math.floor(Math.random()*colors.length)]};font-weight:${Math.random()>0.5?'700':'400'};left:${Math.random()*90}vw;top:${Math.random()*85}vh;transform:rotate(${(Math.random()-0.5)*14}deg);opacity:0;`;
    scene.appendChild(el);
    requestAnimationFrame(() => { el.style.opacity = (Math.random() * 0.55 + 0.25).toString(); });
    const life = Math.random() * 3500 + 2000;
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 1000); }, life);
  }

  for (let i = 0; i < 22; i++) setTimeout(spawnWord, i * 85);
  wordInterval = setInterval(spawnWord, 370);
  show(scene);
}

/* ─── INIT CUBOS ─── */
initCube($('cube-light'), 'light');
initCube($('cube-dark'),  'dark');

/* Ocultar hint inicial */
setTimeout(() => { $('zoom-hint').style.opacity = '0'; }, 5500);

/* ─── BOTONES VOLVER ─── */
$('back-from-cubes').addEventListener('click', () => {
  hide($('scene-cubes'));
  [$('cube-light'), $('cube-dark')].forEach(c => { if (c._reset) c._reset(); });
  const entry = $('scene-entry');
  entry.style.display = ''; entry.classList.remove('fade-out');
  entry.style.opacity = '0';
  setTimeout(() => entry.style.opacity = '', 50);
});

$('back-from-interior').addEventListener('click', () => {
  hide($('scene-interior'));
  [$('cube-light'), $('cube-dark')].forEach(c => { if (c._reset) c._reset(); });
  setTimeout(() => show($('scene-cubes')), 350);
});

$('back-from-words').addEventListener('click', () => {
  const scene = $('scene-words');
  hide(scene);
  if (wordInterval) { clearInterval(wordInterval); wordInterval = null; }
  scene.querySelectorAll('.word-particle').forEach(w => w.remove());
  // volver al interior
  const interior = $('scene-interior');
  interior.className = 'active ' + (currentMode === 'light' ? 'light-mode' : 'dark-mode');
});
</script>
</body>
</html>
